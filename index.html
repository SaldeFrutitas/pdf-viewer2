<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PDF Viewer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar for future expansion or status -->
        <aside id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
                <h2>Document</h2>
            </div>
            <div id="thumbnail-list" class="thumbnail-list"></div>
        </aside>

        <main id="main-content">
            <!-- Glassmorphic Toolbar -->
            <header id="toolbar">
                <div class="toolbar-left">
                    <button id="sidebar-toggle" title="Toggle Sidebar" class="btn-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </button>
                    <span id="doc-title" class="doc-title">Loading...</span>
                </div>

                <div class="toolbar-center">
                    <div class="pagination-controls">
                        <button id="prev-page" class="btn-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                        </button>
                        <div class="page-count">
                            <input type="number" id="page-num" value="1" min="1">
                            <span class="separator">/</span>
                            <span id="page-total">0</span>
                        </div>
                        <button id="next-page" class="btn-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                        </button>
                    </div>

                    <div class="divider"></div>

                    <div class="zoom-controls">
                        <button id="zoom-out" class="btn-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" transform="rotate(45 12 12)"/></svg>
                        </button>
                        <select id="zoom-select" class="btn-select">
                            <option value="0.5">50%</option>
                            <option value="0.75">75%</option>
                            <option value="1" selected>100%</option>
                            <option value="1.25">125%</option>
                            <option value="1.5">150%</option>
                            <option value="2">200%</option>
                            <option value="page-fit">Page Fit</option>
                            <option value="page-width">Page Width</option>
                        </select>
                        <button id="zoom-in" class="btn-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="toolbar-right">
                    <button id="download-btn" title="Download PDF" class="btn-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
                    </button>
                    <button id="theme-toggle" title="Toggle Theme" class="btn-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                    </button>
                </div>
            </header>

            <!-- PDF Viewer Area -->
            <div id="viewer-container">
                <div id="loading-spinner" class="spinner">
                    <div class="bounce1"></div>
                    <div class="bounce2"></div>
                    <div class="bounce3"></div>
                </div>
                <div id="error-message" class="error-msg hidden">
                    <p>Failed to load PDF. Please check the URL and CORS settings.</p>
                </div>
                <!-- The actual canvas where the page is rendered -->
                <canvas id="pdf-canvas"></canvas>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
