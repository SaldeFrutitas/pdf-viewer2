<!DOCTYPE html>
<html lang="en" class="h-full bg-transparent">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>digiApps PDF Viewer</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'sans-serif'],
					},
					colors: {
						primary: '#0A77F3',
					},
					boxShadow: {
						'premium': '0 10px 30px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
						'toolbar': '0 -4px 15px -3px rgba(0, 0, 0, 0.07)',
					}
				}
			}
		}
	</script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
	<style type="text/tailwindcss">
		@layer utilities {
            .scrollbar-custom::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
            .scrollbar-custom::-webkit-scrollbar-track {
                background: transparent;
                border-radius: 9999px;
            }
            .scrollbar-custom::-webkit-scrollbar-thumb {
                @apply bg-white/50 rounded-full hover:bg-white/50;
                border: 3px solid transparent;
                background-clip: padding-box;
                border-radius: 9999px;
            }
        }

        #zoom-select option {
            background-color: #252525;
            color: #f5f5f5;
            border-radius: 10px;
        }

        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                border: none !important;
                overflow: visible !important;
            }
            #app {
                display: none !important;
            }
            #print-container {
                display: block !important;
            }
            #print-container canvas {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                page-break-after: always !important;
                box-shadow: none !important;
                margin: 0 !important;
            }
        }
        
        .docx-content {
            background: white;
            color: black;
            padding: 3rem;
            max-width: 816px;
            width: 100%;
            margin: 2rem auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }
        .docx-content p { margin-bottom: 1em; line-height: 1.6; }
        .docx-content h1, .docx-content h2, .docx-content h3, .docx-content h4 { font-weight: bold; margin-top: 1.5em; margin-bottom: 0.5em; }
        .docx-content h1 { font-size: 2em; }
        .docx-content h2 { font-size: 1.5em; }
        .docx-content h3 { font-size: 1.17em; }
        .docx-content ul, .docx-content ol { margin-bottom: 1em; padding-left: 2em; }
        .docx-content ul { list-style-type: disc; }
        .docx-content ol { list-style-type: decimal; }
        .docx-content table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
        .docx-content th, .docx-content td { border: 1px solid #ccc; padding: 8px; }
        .docx-content img { max-width: 100%; height: auto; }
    </style>
</head>

<body class="bg-transparent text-white h-full overflow-hidden font-sans">
	<div id="app" class="flex h-full w-full">
		<main id="main-content" class="flex-1 flex flex-col overflow-hidden rounded-2xl">
			<footer class="flex justify-center pb-0 z-50">
				<div id="toolbar"
					class="rounded-t-2xl shadow-toolbar w-full flex items-center justify-between bg-[#252525]/50 backdrop-blur-md p-1 translate-y-0 transition-transform">

					<div class="flex flex-1 items-center justify-start gap-6">
						<button id="sidebar-toggle" title="View Thumbnails" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
							<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
							</svg>
						</button>
						<div class="flex items-center space-x-1 rounded-xl">
							<button id="prev-page" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
								</svg>
							</button>
							<div class="flex items-center">
								<input type="number" id="page-num" value="1" min="1"
									class="w-8 bg-transparent border-none text-center font-light text-sm focus:ring-0 p-0 text-[#f5f5f5]">
								<span class="text-[#f5f5f5] font-light select-none pr-3">/</span>
								<span id="page-total" class="text-sm font-light text-[#f5f5f5]">0</span>
							</div>
							<button id="next-page" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
								</svg>
							</button>
						</div>
					</div>

					<div class="flex items-center justify-center space-x-4">
						<div class="flex items-center space-x-2 rounded-xl">
							<button id="rotate-left" title="Rotate left" class="text-white p-1 border border-transparent hover:border-[#0A77F3] scale-x-[-1]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
									<mask id="mask_rotate_left" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="24"
										height="24">
										<rect width="24" height="24" fill="currentColor" />
									</mask>
									<g mask="url(#mask_rotate_left)">
										<path
											d="M9.71875 10.0498C10.8903 8.87853 12.7894 8.87853 13.9609 10.0498L16.79 12.8789L16.8955 12.9902C17.9595 14.1678 17.9248 15.9861 16.79 17.1211L13.9609 19.9492L13.8496 20.0557C12.7099 21.0854 10.9698 21.0854 9.83008 20.0557L9.71875 19.9492L6.88965 17.1211C5.75489 15.9861 5.72017 14.1678 6.78418 12.9902L6.88965 12.8789L9.71875 10.0498ZM12.5469 11.4639C12.1564 11.0736 11.5233 11.0736 11.1328 11.4639L8.30469 14.293C7.91416 14.6835 7.91416 15.3165 8.30469 15.707L11.1328 18.5352C11.5233 18.9257 12.1564 18.9257 12.5469 18.5352L15.375 15.707C15.7655 15.3165 15.7655 14.6835 15.375 14.293L12.5469 11.4639ZM11.9199 3C13.1224 3 14.263 3.25633 15.3408 3.76953C16.4188 4.28284 17.3321 5.00961 18.0801 5.94824V3.87988H19.8398V9.16016H14.5605V7.39941H16.9795C16.3782 6.57835 15.6376 5.93309 14.7578 5.46387C13.8779 4.99462 12.9318 4.75977 11.9199 4.75977C10.2042 4.75982 8.74889 5.35767 7.55371 6.55273C6.35843 7.74802 5.76074 9.20399 5.76074 10.9199H4C4 8.72001 4.77061 6.84951 6.31055 5.30957C7.85038 3.76985 9.72023 3.00006 11.9199 3Z"
											fill="currentColor" />
									</g>
								</svg>
							</button>
							<button id="zoom-out" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
								</svg>
							</button>
							<select id="zoom-select" class="bg-transparent rounded-lg text-xs font-medium cursor-pointer text-[#f5f5f5] py-1 px-2 border border-[#3d3d3d]
                                hover:border-[#0A77F3] hover:text-[#0A77F3] transition-all duration-300">
								<option value="0.5">50%</option>
								<option value="0.75">75%</option>
								<option value="1">100%</option>
								<option value="1.25">125%</option>
								<option value="1.5">150%</option>
								<option value="2">200%</option>
								<option value="3">300%</option>
								<option value="4">400%</option>
								<option value="page-height">Ajuste</option>
								<option value="page-width" selected>Ancho</option>
							</select>
							<button id="zoom-in" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
								</svg>
							</button>
							<button id="rotate-right" title="Rotate right" class="text-white p-1 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
								<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
									<mask id="mask_rotate_right" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="24"
										height="24">
										<rect width="24" height="24" fill="currentColor" />
									</mask>
									<g mask="url(#mask_rotate_right)">
										<path
											d="M9.71875 10.0498C10.8903 8.87853 12.7894 8.87853 13.9609 10.0498L16.79 12.8789L16.8955 12.9902C17.9595 14.1678 17.9248 15.9861 16.79 17.1211L13.9609 19.9492L13.8496 20.0557C12.7099 21.0854 10.9698 21.0854 9.83008 20.0557L9.71875 19.9492L6.88965 17.1211C5.75489 15.9861 5.72017 14.1678 6.78418 12.9902L6.88965 12.8789L9.71875 10.0498ZM12.5469 11.4639C12.1564 11.0736 11.5233 11.0736 11.1328 11.4639L8.30469 14.293C7.91416 14.6835 7.91416 15.3165 8.30469 15.707L11.1328 18.5352C11.5233 18.9257 12.1564 18.9257 12.5469 18.5352L15.375 15.707C15.7655 15.3165 15.7655 14.6835 15.375 14.293L12.5469 11.4639ZM11.9199 3C13.1224 3 14.263 3.25633 15.3408 3.76953C16.4188 4.28284 17.3321 5.00961 18.0801 5.94824V3.87988H19.8398V9.16016H14.5605V7.39941H16.9795C16.3782 6.57835 15.6376 5.93309 14.7578 5.46387C13.8779 4.99462 12.9318 4.75977 11.9199 4.75977C10.2042 4.75982 8.74889 5.35767 7.55371 6.55273C6.35843 7.74802 5.76074 9.20399 5.76074 10.9199H4C4 8.72001 4.77061 6.84951 6.31055 5.30957C7.85038 3.76985 9.72023 3.00006 11.9199 3Z"
											fill="currentColor" />
									</g>
								</svg>
							</button>
						</div>
					</div>
					<!-- 3 dots menu -->
					<div class="flex flex-1 items-center justify-end gap-2">
						<button id="view-mode-toggle" title="Book view"
							class="
								text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
							<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
									d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
							</svg>
						</button>
						<button id="print-btn" title="Print"
							class="
								text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
							<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
									d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
							</svg>
						</button>
					</div>
				</div>
			</footer>

			<div class="flex-1 flex flex-row overflow-hidden">
				<aside id="sidebar"
					class="hidden w-56 border-r border-[#252525] flex flex-col transition-all duration-300 z-40">
					<div id="thumbnail-list" class="flex-1 overflow-y-auto scrollbar-custom p-5 space-y-6 "></div>
				</aside>

				<div id="viewer-container"
					class="flex-1 overflow-auto p-10 flex flex-col items-center bg-transparent scrollbar-custom">
					<div id="loading-spinner" class="mt-20 flex space-x-2 justify-center items-center col-span-full">
						<div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></div>
						<div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></div>
						<div class="h-3 w-3 bg-primary rounded-full animate-bounce"></div>
					</div>
					<div id="error-message"
						class="hidden mt-20 max-w-md p-6 bg-red-50 border border-red-200 rounded-2xl text-center text-red-600 col-span-full">
						<p class="font-medium">No se pudo cargar el PDF.</p>
						<p class="text-sm opacity-75 mt-1">Verifica la URL y los permisos CORS.</p>
					</div>
				</div>
			</div>
		</main>
	</div>

	<div id="print-container" class="hidden"></div>

	<script src="app.js"></script>
</body>

</html>
