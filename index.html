<!DOCTYPE html>
<html lang="en" class="h-full bg-transparent">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PDF Viewer</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0A77F3',
                        premium: {
                            bg: '#f8fafc',
                            canvas: '#ffffff',
                            border: '#e2e8f0',
                            toolbar: 'rgba(255, 255, 255, 0.85)',
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
                        'toolbar': '0 -4px 15px -3px rgba(0, 0, 0, 0.07)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply backdrop-blur-xl bg-white/80 border border-white/20;
            }
            .scrollbar-hide::-webkit-scrollbar {
                width: 10px;
            }
            .scrollbar-custom::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
            .scrollbar-custom::-webkit-scrollbar-track {
                background: transparent;
                border-radius: 9999px;
            }
            .scrollbar-custom::-webkit-scrollbar-thumb {
                @apply bg-white/50 rounded-full hover:bg-white/50;
                /* El truco para que la barra se vea más delgada que el fondo */
                border: 3px solid transparent;
                background-clip: padding-box;
                border-radius: 9999px;
            }
        }

        /* Estilo para las opciones del desplegable */
        #zoom-select option {
            background-color: #252525;
            color: #f5f5f5;
            border-radius: 10px;
        }

        /* Print Styles */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                border: none !important;
                overflow: visible !important;
            }
            #app {
                display: none !important;
            }
            #print-container {
                display: block !important;
            }
            #print-container canvas {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                page-break-after: always !important;
                box-shadow: none !important;
                margin: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-blur-200 text-slate-800 h-full overflow-hidden font-sans rounded-2xl">
    <!-- Main Application UI -->
    <div id="app" class="flex h-full w-full">
        <main id="main-content" class="flex-1 flex flex-col overflow-hidden rounded-2xl">
            <!-- Toolbar -->
            <footer class="flex justify-center pb-0 z-50">
                <div id="toolbar"
                    class="rounded-t-2xl shadow-toolbar w-full flex items-center justify-between bg-[#252525] p-1 translate-y-0 transition-transform">

                    <!-- Segment 1 -->
                    <div class="flex flex-1 items-center justify-start">
                        <button id="sidebar-toggle" title="Miniaturas" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16M4 18h7" />
                            </svg>
                        </button>
                        <span id="doc-title"
                            class="text-sm font-semibold truncate max-w-[150px] text-slate-700 hidden">Cargando...</span>
                    </div>

                    <!-- Segment 2 -->
                    <div class="flex flex-1 items-center justify-center space-x-8">
                        <div class="flex items-center space-x-2 rounded-xl">
                            <button id="prev-page" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 19l-7-7 7-7" />
                                </svg>
                            </button>
                            <div class="flex items-center">
                                <input type="number" id="page-num" value="1" min="1"
                                    class="w-10 bg-transparent border-none text-center font-bold text-sm focus:ring-0 p-0 text-[#f5f5f5]">
                                <span class="text-slate-400 font-medium select-none pr-4">/</span>
                                <span id="page-total" class="text-sm font-medium text-[#f5f5f5]">0</span>
                            </div>
                            <button id="next-page" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                        </div>

                        <div class="flex items-center space-x-2 rounded-xl">
                            <button id="zoom-out" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20 12H4" />
                                </svg>
                            </button>
                            <select id="zoom-select" class="bg-transparent rounded-lg text-xs font-medium cursor-pointer text-[#f5f5f5] py-1 px-2 border border-[#3d3d3d]
                                hover:border-[#0A77F3] hover:text-[#0A77F3] transition-all duration-300">
                                <option value="0.5">50%</option>
                                <option value="0.75">75%</option>
                                <option value="1" selected>100%</option>
                                <option value="1.25">125%</option>
                                <option value="1.5">150%</option>
                                <option value="2">200%</option>
                                <option value="page-fit">Ajuste</option>
                                <option value="page-width">Ancho</option>
                            </select>
                            <button id="zoom-in" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Segment 3 -->
                    <div class="flex flex-1 items-center justify-end">
                        <button id="print-btn" title="Imprimir" class="text-white p-1.5 border border-transparent hover:border-[#0A77F3]
                                hover:shadow-sm hover:text-[#0A77F3] rounded-xl transition-all duration-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </footer>

            <div class="flex-1 flex flex-row overflow-hidden">
                <aside id="sidebar"
                    class="hidden w-64 bg-black/80 backdrop-blur-sm border-r border-[#3d3d3d] flex flex-col transition-all duration-300 z-40">
                    <div id="thumbnail-list" class="flex-1 overflow-y-auto scrollbar-custom p-5 space-y-6"></div>
                </aside>

                <div id="viewer-container"
                    class="flex-1 overflow-auto p-10 flex flex-col items-center bg-black/80 backdrop-blur-sm scroll-smooth scrollbar-custom">
                    <div id="loading-spinner" class="mt-20 flex space-x-2 justify-center items-center">
                        <div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                        <div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                        <div class="h-3 w-3 bg-primary rounded-full animate-bounce"></div>
                    </div>
                    <div id="error-message"
                        class="hidden mt-20 max-w-md p-6 bg-red-50 border border-red-200 rounded-2xl text-center text-red-600">
                        <p class="font-medium">No se pudo cargar el PDF.</p>
                        <p class="text-sm opacity-75 mt-1">Verifica la URL y los permisos CORS.</p>
                    </div>
                    <!-- Las páginas se generarán dinámicamente aquí -->
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Print Container -->
    <div id="print-container" class="hidden"></div>

    <script src="app.js"></script>
</body>

</html>
