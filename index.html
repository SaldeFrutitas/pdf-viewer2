<!DOCTYPE html>
<html lang="en" class="h-full bg-red-200">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PDF Viewer</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        premium: {
                            bg: '#f8fafc',
                            canvas: '#ffffff',
                            border: '#e2e8f0',
                            toolbar: 'rgba(255, 255, 255, 0.85)',
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
                        'toolbar': '0 -4px 15px -3px rgba(0, 0, 0, 0.07)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply backdrop-blur-xl bg-white/80 border border-white/20;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-custom::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-custom::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollbar-custom::-webkit-scrollbar-thumb {
                @apply bg-slate-200 rounded-full hover:bg-slate-300;
            }
        }
    </style>
</head>

<body class="bg-blur-200 text-slate-800 h-full overflow-hidden font-sans border">
    <div id="app" class="flex h-full w-full">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="hidden w-64 bg-white border-r border-premium-border flex flex-col transition-all duration-300 z-40 transform">
            <div class="px-5 py-6 border-b border-premium-border">
                <h2 class="text-lg font-semibold text-slate-700">Documento</h2>
            </div>
            <div id="thumbnail-list" class="flex-1 overflow-y-auto scrollbar-custom p-5 space-y-6">
                <!-- Thumbnails injected here -->
            </div>
        </aside>

        <main id="main-content" class="flex-1 flex flex-col relative overflow-hidden">
            <!-- PDF Viewer Area -->
            <div id="viewer-container"
                class="flex-1 overflow-auto p-10 flex flex-col items-center bg-slate-100/50 scroll-smooth scrollbar-custom">
                <!-- Loading State -->
                <div id="loading-spinner" class="mt-20 flex space-x-2 justify-center items-center">
                    <div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                    <div class="h-3 w-3 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="h-3 w-3 bg-primary rounded-full animate-bounce"></div>
                </div>

                <!-- Error State -->
                <div id="error-message"
                    class="hidden mt-20 max-w-md p-6 bg-red-50 border border-red-200 rounded-2xl text-center text-red-600">
                    <p class="font-medium">No se pudo cargar el PDF.</p>
                    <p class="text-sm opacity-75 mt-1">Verifica la URL y los permisos CORS.</p>
                </div>

                <!-- Main Canvas -->
                <canvas id="pdf-canvas"
                    class="hidden shadow-premium bg-white transition-transform duration-200"></canvas>
            </div>

            <!-- Redesigned Toolbar mit Rounded Top Borders -->
            <footer class="absolute bottom-0 left-0 right-0 flex justify-center px-4 pb-0 z-50">
                <div id="toolbar"
                    class="glass rounded-t-3xl shadow-toolbar w-full max-w-4xl flex items-center justify-between px-8 py-3 translate-y-0 transition-transform">
                    <div class="flex items-center space-x-3">
                        <button id="sidebar-toggle" title="Miniaturas"
                            class="p-2 hover:bg-slate-100 rounded-xl transition-colors text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16M4 18h7" />
                            </svg>
                        </button>
                        <div class="h-6 w-px bg-slate-200"></div>
                        <span id="doc-title"
                            class="text-sm font-semibold truncate max-w-[150px] text-slate-700">Cargando...</span>
                    </div>

                    <div class="flex items-center space-x-6">
                        <!-- Pagination -->
                        <div class="flex items-center space-x-2 bg-slate-100 p-1 rounded-xl">
                            <button id="prev-page"
                                class="p-1.5 hover:bg-white hover:shadow-sm rounded-lg transition-all text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 19l-7-7 7-7" />
                                </svg>
                            </button>
                            <div class="flex items-center space-x-2 px-1">
                                <input type="number" id="page-num" value="1" min="1"
                                    class="w-10 bg-transparent border-none text-center font-bold text-sm focus:ring-0 p-0 text-slate-800">
                                <span class="text-slate-400 font-medium select-none">/</span>
                                <span id="page-total" class="text-sm font-medium text-slate-500">0</span>
                            </div>
                            <button id="next-page"
                                class="p-1.5 hover:bg-white hover:shadow-sm rounded-lg transition-all text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                        </div>

                        <!-- Zoom -->
                        <div class="flex items-center space-x-2 bg-slate-100 p-1 rounded-xl">
                            <button id="zoom-out"
                                class="p-1.5 hover:bg-white hover:shadow-sm rounded-lg transition-all text-slate-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20 12H4" />
                                </svg>
                            </button>
                            <select id="zoom-select"
                                class="bg-transparent border-none text-xs font-bold focus:ring-0 cursor-pointer text-slate-700 py-0 pr-8">
                                <option value="0.5">50%</option>
                                <option value="0.75">75%</option>
                                <option value="1" selected>100%</option>
                                <option value="1.25">125%</option>
                                <option value="1.5">150%</option>
                                <option value="2">200%</option>
                                <option value="page-fit">Ajuste</option>
                                <option value="page-width">Ancho</option>
                            </select>
                            <button id="zoom-in"
                                class="p-1.5 hover:bg-white hover:shadow-sm rounded-lg transition-all text-slate-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <button id="download-btn" title="Descargar"
                            class="p-2.5 bg-primary text-white rounded-xl shadow-sm hover:shadow-md hover:bg-blue-600 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
